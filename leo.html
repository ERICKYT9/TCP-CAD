<!DOCTYPE html>
<html>
<head>
  <title>LEO CAD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>LEO CAD SYSTEM</h1>

<p id="status">Loading CAD...</p>

<div id="panel" style="display:none;">

  <h2 id="roleText"></h2>

  <!-- UNIT STATUS -->
  <h3>Unit Status</h3>
  <button onclick="setStatus('10-8')">10-8 (Available)</button>
  <button onclick="setStatus('10-6')">10-6 (Busy)</button>
  <button onclick="setStatus('10-97')">10-97 (Enroute)</button>
  <button onclick="setStatus('10-23')">10-23 (On Scene)</button>

  <hr>

  <!-- CALLS -->
  <h3>Active Calls</h3>
  <div id="calls"></div>

  <hr>

  <!-- MDT -->
  <h3>MDT Lookup</h3>
  <input id="search" placeholder="Search Plate or Name">
  <button onclick="searchMDT()">Search</button>
  <div id="results"></div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  updateDoc,
  collection,
  onSnapshot,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ---------------- LOGIN ---------------- */

const uid = localStorage.getItem("uid");

if (!uid) {
  window.location.href = "./index.html";
}

const me = await getDoc(doc(db, "users", uid));

if (!me.exists()) {
  window.location.href = "./index.html";
}

const role = me.data().role;

/* ---------------- ROLE CHECK ---------------- */

const allowedRoles = ["Police", "CHP", "LASO", "Admin"];

if (!allowedRoles.includes(role)) {
  document.body.innerHTML = "<h1>Access Denied</h1>";
}

/* ---------------- SHOW UI ---------------- */

document.getElementById("status").style.display = "none";
document.getElementById("panel").style.display = "block";
document.getElementById("roleText").innerText = "Role: " + role;

/* ---------------- UNIT STATUS ---------------- */

window.setStatus = async (status) => {
  await updateDoc(doc(db, "users", uid), {
    status: status
  });
};

/* ---------------- LIVE CALLS ---------------- */

onSnapshot(collection(db, "calls"), (snap) => {
  const container = document.getElementById("calls");
  container.innerHTML = "";

  snap.forEach(call => {
    const data = call.data();

    const div = document.createElement("div");
    div.style.border = "1px solid #999";
    div.style.margin = "6px";
    div.style.padding = "6px";

    div.innerHTML = `
      <b>${data.type}</b><br>
      📍 ${data.location}<br>
      📡 Status: ${data.status}<br>
      🚓 Assigned: ${data.assignedUnit || "None"}<br>
      ✔ Accepted: ${data.accepted ? "YES" : "NO"}<br>
    `;

    container.appendChild(div);
  });
});

/* ---------------- MDT SEARCH ---------------- */

window.searchMDT = async () => {
  const q = document.getElementById("search").value.toLowerCase();
  const results = document.getElementById("results");
  results.innerHTML = "";

  // VEHICLES
  const vehicles = await getDocs(collection(db, "vehicles"));

  vehicles.forEach(v => {
    const d = v.data();

    if (
      (d.plate && d.plate.toLowerCase().includes(q)) ||
      (d.model && d.model.toLowerCase().includes(q))
    ) {
      results.innerHTML += `
        <div>
          🚗 VEHICLE<br>
          Plate: ${d.plate}<br>
          Model: ${d.model}
        </div><hr>
      `;
    }
  });

  // PERSONS
  const persons = await getDocs(collection(db, "persons"));

  persons.forEach(p => {
    const d = p.data();

    if (d.name && d.name.toLowerCase().includes(q)) {
      results.innerHTML += `
        <div>
          👤 PERSON<br>
          Name: ${d.name}<br>
          DOB: ${d.dob}
        </div><hr>
      `;
    }
  });
};

</script>

</body>
</html>
