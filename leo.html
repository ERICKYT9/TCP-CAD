<!DOCTYPE html>
<html>
<head>
  <title>LEO CAD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>LEO CAD</h1>
<p id="status">Loading...</p>

<div id="panel" style="display:none;">

<h2>Unit Status</h2>

<button onclick="setStatus('10-8')">10-8</button>
<button onclick="setStatus('10-6')">10-6</button>
<button onclick="setStatus('10-97')">10-97</button>
<button onclick="setStatus('10-23')">10-23</button>

<hr>

<h2>Active Calls</h2>
<div id="calls"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  updateDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "./index.html";

const ref = doc(db, "users", uid);
const snap = await getDoc(ref);

if (!snap.exists()) window.location.href = "./index.html";

const user = snap.data();

if (!["LEO","Admin"].includes(user.role)) {
  document.body.innerHTML = "Access Denied";
}

document.getElementById("status").style.display = "none";
document.getElementById("panel").style.display = "block";

window.setStatus = async (status) => {
  await updateDoc(ref, { status });
};

window.accept = async (id) => {
  await updateDoc(doc(db,"calls",id), {
    accepted: true,
    status: "Enroute",
    assigned: uid
  });
};

window.decline = async (id) => {
  await updateDoc(doc(db,"calls",id), {
    assigned: null,
    accepted: false,
    status: "Active"
  });
};

onSnapshot(collection(db,"calls"), snap => {
  const c = document.getElementById("calls");
  c.innerHTML = "";

  snap.forEach(d => {
    const call = d.data();

    c.innerHTML += `
      <div style="border:1px solid #ccc;margin:5px;padding:5px">
        <b>${call.type}</b><br>
        ${call.location}<br>
        Status: ${call.status}<br>
        Assigned: ${call.assigned || "None"}<br>

        ${call.assigned === uid ? `
          <button onclick="accept('${d.id}')">Accept</button>
          <button onclick="decline('${d.id}')">Decline</button>
        ` : ""}
      </div>
    `;
  });
});
</script>

</body>
</html>
