<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LEO CAD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>LEO CAD</h1>

<button class="back" onclick="history.back()">⬅ Back</button>

<div class="card">
  <button onclick="setStatus('10-8')">10-8</button>
  <button onclick="setStatus('10-6')">10-6</button>
  <button onclick="setStatus('10-7')">10-7</button>
  <p id="statusText">Status: Unknown</p>
</div>

<div id="calls"></div>

<script type="module">

import { db } from "./js/firebase.js";
import {
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const uid = localStorage.getItem("discordId");

window.setStatus = (s) => {
  document.getElementById("statusText").innerText = "Status: " + s;
};

onSnapshot(collection(db, "calls"), (snap) => {
  const box = document.getElementById("calls");
  box.innerHTML = "";

  snap.forEach(d => {
    const c = d.data();

    box.innerHTML += `
      <div class="card">
        <b>${c.type}</b><br>
        ${c.location}<br>
        Status: ${c.status}<br>

        <button onclick="accept('${d.id}')">Accept</button>
      </div>
    `;
  });
});

window.accept = async (id) => {
  await updateDoc(doc(db, "calls", id), {
    assignedTo: uid,
    status: "Enroute"
  });
};

</script>

</body>
</html>
