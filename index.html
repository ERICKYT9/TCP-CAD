<!DOCTYPE html>
<html>
<head>
  <title>TCP CAD Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>TCP CAD</h1>

<div id="panel">

  <h2>Secure Login</h2>

  <button onclick="login()">Login with Discord</button>

</div>

<script>
const CLIENT_ID = "YOUR_CLIENT_ID";

function login() {
  const redirect = encodeURIComponent("https://erickyt9.github.io/TCP-CAD/dashboard.html");

  const url =
  `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${redirect}&scope=identify`;

  window.location.href = url;
}
</script>

</body>
</html>
