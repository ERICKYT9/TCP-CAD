<!DOCTYPE html>
<html>
<head>
  <title>TCP CAD Login</title>
</head>
<body>

<h1>TCP CAD LOGIN</h1>

<button onclick="login()">Login with Discord</button>

<script>
const CLIENT_ID = "YOUR_DISCORD_CLIENT_ID";
const REDIRECT = window.location.origin + "/TCP-CAD/";

function login() {
  const oauth = 
`https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT)}&scope=identify`;

  window.location.href = oauth;
}
</script>

</body>
</html>
