<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TCP CAD Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: url("https://images.unsplash.com/photo-1581091870622-2c9b6b9c2d2d") center/cover no-repeat;
      color: white;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #5865F2;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="overlay">
  <div class="card">
    <h2>TCP CAD</h2>
    <p>Secure Access System</p>
    <button onclick="login()">Login with Discord</button>
  </div>
</div>

<script>
const CLIENT_ID = "1517160152376021002";
const REDIRECT = "https://erickyt9.github.io/TCP-CAD/dashboard.html";

function login() {
  const url =
    "https://discord.com/oauth2/authorize" +
    `?client_id=${CLIENT_ID}` +
    "&response_type=token" +
    `&redirect_uri=${encodeURIComponent(REDIRECT)}` +
    "&scope=identify";

  window.location.href = url;
}
</script>

</body>
</html>
