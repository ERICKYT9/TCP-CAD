<!DOCTYPE html>
<html>
<head>
  <title>TCP CAD Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>TCP CAD LOGIN</h1>

<div class="card">
  <button onclick="login()">Login with Discord</button>
</div>

<script>
const CLIENT_ID = "YOUR_CLIENT_ID";
const REDIRECT = "https://erickyt9.github.io/TCP-CAD/dashboard.html";

function login() {
  window.location.href =
    `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}` +
    `&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT)}` +
    `&scope=identify`;
}
</script>

</body>
</html>
