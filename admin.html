<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Admin Panel</h1>
<p id="status">Loading users...</p>

<div id="users"></div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "./index.html";

// get current user
import { getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const me = await getDoc(doc(db, "users", uid));
if (!me.exists() || me.data().role !== "Admin") {
  document.body.innerHTML = "<h1>Access Denied</h1>";
}

// load users
const snap = await getDocs(collection(db, "users"));

const container = document.getElementById("users");
document.getElementById("status").style.display = "none";

snap.forEach(user => {
  const data = user.data();

  const div = document.createElement("div");
  div.style.margin = "10px";
  div.innerHTML = `
    <b>${user.id}</b>
    <br>
    Current Role: ${data.role}
    <br>
    <select id="role-${user.id}">
      <option>Police</option>
      <option>CHP</option>
      <option>LASO</option>
      <option>Fire</option>
      <option>EMS</option>
      <option>Dispatch</option>
      <option>FBI</option>
      <option>DOT</option>
      <option>Admin</option>
      <option>Civilian</option>
    </select>
    <button onclick="saveRole('${user.id}')">Save</button>
  `;

  container.appendChild(div);
});

window.saveRole = async (id) => {
  const select = document.getElementById("role-" + id);
  const newRole = select.value;

  await updateDoc(doc(db, "users", id), {
    role: newRole
  });

  alert("Role updated!");
};
</script>

</body>
</html>
