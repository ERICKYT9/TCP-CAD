<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dispatch</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Dispatch Panel</h1>

<button class="back" onclick="history.back()">⬅ Back</button>

<div class="card">
  <input id="type" placeholder="Call Type">
  <input id="location" placeholder="Location">
  <button onclick="createCall()">Create Call</button>
</div>

<div id="calls"></div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

window.createCall = async () => {
  await addDoc(collection(db, "calls"), {
    type: type.value,
    location: location.value,
    status: "Active",
    assignedTo: null,
    createdAt: Date.now()
  });

  type.value = "";
  location.value = "";
};

onSnapshot(collection(db, "calls"), (snap) => {
  const box = document.getElementById("calls");
  box.innerHTML = "";

  snap.forEach(d => {
    const c = d.data();

    box.innerHTML += `
      <div class="card">
        <b>${c.type}</b><br>
        ${c.location}<br>
        Status: ${c.status}
      </div>
    `;
  });
});

</script>

</body>
</html>
