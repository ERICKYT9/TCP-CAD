<!DOCTYPE html>
<html>
<head>
  <title>Dispatch CAD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Dispatch Panel</h1>

<div class="card">

<h3>Create Call</h3>

<input id="type" placeholder="Call Type (e.g. 10-31 Robbery)">
<input id="location" placeholder="Location">
<button onclick="createCall()">Create Call</button>

</div>

<div class="card">
<h3>Active Calls</h3>
<div id="calls"></div>
</div>

<script type="module">

import { db } from "./js/firebase.js";
import {
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* CREATE CALL */
window.createCall = async () => {
  await addDoc(collection(db, "calls"), {
    type: document.getElementById("type").value,
    location: document.getElementById("location").value,
    status: "Active",
    assignedTo: null,
    createdAt: Date.now()
  });

  document.getElementById("type").value = "";
  document.getElementById("location").value = "";
};

/* LIVE FEED */
onSnapshot(collection(db, "calls"), (snap) => {
  const box = document.getElementById("calls");
  box.innerHTML = "";

  snap.forEach(doc => {
    const c = doc.data();

    box.innerHTML += `
      <div class="card">
        <b>${c.type}</b><br>
        📍 ${c.location}<br>
        Status: ${c.status}<br>
        Assigned: ${c.assignedTo || "None"}
      </div>
    `;
  });
});

</script>

</body>
</html>
