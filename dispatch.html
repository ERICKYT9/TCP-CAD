<!DOCTYPE html>
<html>
<head>
  <title>Dispatch</title>
</head>
<body>

<h1>Dispatch</h1>

<div id="panel">

<h2>Create Call</h2>
<input id="type" placeholder="Type">
<input id="location" placeholder="Location">
<button onclick="create()">Create</button>

<h2>Calls</h2>
<div id="calls"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  updateDoc,
  doc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

window.create = async () => {
  await addDoc(collection(db,"calls"),{
    type:type.value,
    location:location.value,
    status:"Active",
    assigned:null,
    accepted:false
  });
};

window.assign = async (id) => {
  await updateDoc(doc(db,"calls",id),{
    assigned:"unassigned",
    status:"Pending"
  });
};

onSnapshot(collection(db,"calls"),snap=>{
  const c=document.getElementById("calls");
  c.innerHTML="";
  snap.forEach(d=>{
    const call=d.data();
    c.innerHTML+=`
      <div>
        ${call.type} - ${call.location}<br>
        ${call.status}<br>
        <button onclick="assign('${d.id}')">Assign</button>
      </div>
    `;
  });
});
</script>

</body>
</html>
