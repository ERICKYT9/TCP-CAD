<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>TCP CAD DASHBOARD</h1>

<p id="status">Loading...</p>

<div id="panel" style="display:none;" class="card">

  <h2>Welcome <span id="name"></span></h2>
  <p>ID: <span id="did"></span></p>
  <p>Role: <span id="role"></span></p>

  <button onclick="go('LEO')">LEO</button>
  <button onclick="go('Dispatch')">Dispatch</button>
  <button onclick="go('Civilian')">Civilian</button>
  <button onclick="go('Admin')">Admin</button>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import {
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

function getToken() {
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace("#",""));
  return params.get("access_token");
}

const token = getToken();
window.history.replaceState({}, document.title, window.location.pathname);

if (!token) {
  document.getElementById("status").innerText = "No login detected";
  throw new Error("No token");
}

const res = await fetch("https://discord.com/api/users/@me", {
  headers: { Authorization: `Bearer ${token}` }
});

const user = await res.json();

const ref = doc(db, "users", user.id);
const snap = await getDoc(ref);

if (!snap.exists()) {
  await setDoc(ref, {
    discordId: user.id,
    username: user.username,
    role: "Civilian",
    status: "10-8"
  });
}

const finalUser = (await getDoc(ref)).data();

document.getElementById("status").style.display = "none";
document.getElementById("panel").style.display = "block";

document.getElementById("name").innerText = finalUser.username;
document.getElementById("did").innerText = finalUser.discordId;
document.getElementById("role").innerText = finalUser.role;

window.go = (r) => {
  location.href = "./" + r.toLowerCase() + ".html";
};

</script>

</body>
</html>
