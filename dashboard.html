<!DOCTYPE html>
<html>
<head>
  <title>Dispatch CAD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dispatch CAD</h1>
<p id="status">Checking access...</p>

<div id="panel" style="display:none;">
  <h2>Dispatch Control Center</h2>
  <button>📡 Active Calls</button>
  <button>🚓 Units Status</button>
  <button>➕ Create Call</button>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "./index.html";

const snap = await getDoc(doc(db, "users", uid));
if (!snap.exists()) window.location.href = "./index.html";

const role = snap.data().role;

if (role !== "Dispatch" && role !== "Admin") {
  document.body.innerHTML = "Access Denied";
} else {
  document.getElementById("status").style.display = "none";
  document.getElementById("panel").style.display = "block";
}
</script>

</body>
</html>
