<!DOCTYPE html>
<html>
<head>
  <title>TCP CAD Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>TCP CAD MAIN DASHBOARD</h1>

<p id="userInfo">Loading...</p>

<div id="panel" style="display:none;">

  <h2>Select Mode</h2>

  <button onclick="go('Civilian')">Civilian</button>
  <button onclick="go('LEO')">Law Enforcement</button>
  <button onclick="go('Dispatch')">Dispatch</button>
  <button onclick="go('Admin')">Admin</button>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const uid = localStorage.getItem("uid");

if (!uid) {
  window.location.href = "./index.html";
}

const ref = doc(db, "users", uid);
const snap = await getDoc(ref);

if (!snap.exists()) {
  window.location.href = "./index.html";
}

const user = snap.data();

document.getElementById("userInfo").innerText =
  "Logged in as: " + user.username;

document.getElementById("panel").style.display = "block";

window.go = async (role) => {
  await updateDoc(ref, {
    role: role
  });

  if (role === "LEO") window.location.href = "./leo.html";
  if (role === "Civilian") window.location.href = "./civilian.html";
  if (role === "Dispatch") window.location.href = "./dispatch.html";
  if (role === "Admin") window.location.href = "./admin.html";
};

</script>

</body>
</html>
