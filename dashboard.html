<!DOCTYPE html>
<html>
<head>
  <title>TCP CAD Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CAD Dashboard</h1>
<p id="info">Loading...</p>

<div id="panel" style="display:none;">

  <h2>Select Role</h2>

  <button onclick="setRole('Civilian')">Civilian</button>
  <button onclick="setRole('LEO')">Law Enforcement</button>
  <button onclick="setRole('Dispatch')">Dispatch</button>
  <button onclick="setRole('Admin')">Admin</button>

</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "./index.html";

const ref = doc(db, "users", uid);
const snap = await getDoc(ref);

if (!snap.exists()) window.location.href = "./index.html";

const user = snap.data();

document.getElementById("info").innerText = "Logged in as " + user.username;
document.getElementById("panel").style.display = "block";

window.setRole = async (role) => {
  await updateDoc(ref, { role });

  if (role === "LEO") window.location.href = "./leo.html";
  if (role === "Civilian") window.location.href = "./civilian.html";
  if (role === "Dispatch") window.location.href = "./dispatch.html";
  if (role === "Admin") window.location.href = "./admin.html";
};
</script>

</body>
</html>
