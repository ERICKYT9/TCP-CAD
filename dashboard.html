<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>CAD DASHBOARD</h1>

<p id="status">Loading...</p>

<div id="panel" class="card" style="display:none;">
  <h2>Welcome <span id="name"></span></h2>
  <p>Role: <span id="role"></span></p>

  <div class="card nav">
    <button onclick="go('dispatch')">Dispatch</button>
    <button onclick="go('leo')">LEO</button>
    <button onclick="go('civilian')">Civilian</button>
    <button onclick="go('admin')">Admin</button>
  </div>
</div>

<script type="module">

import { db } from "./js/firebase.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

function getToken() {
  const params = new URLSearchParams(location.hash.replace("#",""));
  return params.get("access_token");
}

const token = getToken();
window.history.replaceState({}, document.title, location.pathname);

if (!token) throw new Error("No token");

const res = await fetch("https://discord.com/api/users/@me", {
  headers: { Authorization: `Bearer ${token}` }
});

const user = await res.json();

const ref = doc(db, "users", user.id);
const snap = await getDoc(ref);

if (!snap.exists()) {
  await setDoc(ref, {
    discordId: user.id,
    username: user.username,
    role: "Civilian",
    status: "10-8"
  });
}

const data = (await getDoc(ref)).data();

document.getElementById("status").style.display = "none";
document.getElementById("panel").style.display = "block";

document.getElementById("name").innerText = data.username;
document.getElementById("role").innerText = data.role;

window.go = (p) => location.href = `./${p}.html`;

</script>

</body>
</html>
