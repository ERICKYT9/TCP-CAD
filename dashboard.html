<!DOCTYPE html>
<html>
<head>
  <title>Dispatch CAD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dispatch Center</h1>

<div id="panel" style="display:none;">

  <h2>Create Call</h2>

  <input id="type" placeholder="Call Type">
  <input id="location" placeholder="Location">
  <button id="create">Create Call</button>

  <h2>Active Calls</h2>
  <div id="calls"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
  doc, getDoc,
  collection,
  addDoc,
  updateDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "./index.html";

const me = await getDoc(doc(db, "users", uid));

if (!me.exists() || (me.data().role !== "Dispatch" && me.data().role !== "Admin")) {
  document.body.innerHTML = "<h1>Access Denied</h1>";
}

document.getElementById("panel").style.display = "block";

// CREATE CALL
document.getElementById("create").onclick = async () => {
  await addDoc(collection(db, "calls"), {
    type: type.value,
    location: location.value,
    status: "Active",
    assignedUnit: null,
    timestamp: Date.now()
  });
};

// LIVE CALLS
onSnapshot(collection(db, "calls"), (snap) => {
  const container = document.getElementById("calls");
  container.innerHTML = "";

  snap.forEach(call => {
    const data = call.data();

    const div = document.createElement("div");
    div.style.border = "1px solid white";
    div.style.margin = "5px";
    div.style.padding = "5px";

    div.innerHTML = `
      <b>${data.type}</b><br>
      ${data.location}<br>
      Status: ${data.status}<br>
      Assigned: ${data.assignedUnit || "None"}<br>
      <button onclick="assign('${call.id}')">Assign Me</button>
      <button onclick="closeCall('${call.id}')">Close</button>
    `;

    container.appendChild(div);
  });
});

// ASSIGN
window.assign = async (id) => {
  await updateDoc(doc(db, "calls", id), {
    assignedUnit: uid,
    status: "Assigned"
  });
};

// CLOSE
window.closeCall = async (id) => {
  await updateDoc(doc(db, "calls", id), {
    status: "Closed"
  });
};
</script>

</body>
</html>
