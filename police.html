<!DOCTYPE html>
<html>
<head>
  <title>LEO CAD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>LEO CAD</h1>

<div id="panel" style="display:none;">

  <p id="roleText"></p>

  <h2>Unit Status</h2>

  <button onclick="setStatus('10-8')">10-8</button>
  <button onclick="setStatus('10-6')">10-6</button>
  <button onclick="setStatus('10-7')">10-7</button>

  <h2>Active Calls</h2>
  <div id="calls"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
  doc, getDoc, updateDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if (!uid) window.location.href = "./index.html";

const me = await getDoc(doc(db, "users", uid));

if (!me.exists()) window.location.href = "./index.html";

const role = me.data().role;

const allowed = ["Police", "CHP", "LASO", "Admin"];

if (!allowed.includes(role)) {
  document.body.innerHTML = "<h1>Access Denied</h1>";
}

document.getElementById("panel").style.display = "block";
document.getElementById("roleText").innerText = "Role: " + role;

// STATUS
window.setStatus = async (status) => {
  await updateDoc(doc(db, "users", uid), {
    status
  });
};

// CALLS
onSnapshot(collection(db, "calls"), (snap) => {
  const container = document.getElementById("calls");
  container.innerHTML = "";

  snap.forEach(call => {
    const data = call.data();

    const div = document.createElement("div");
    div.style.border = "1px solid white";
    div.style.margin = "5px";
    div.style.padding = "5px";

    div.innerHTML = `
      <b>${data.type}</b><br>
      ${data.location}<br>
      Status: ${data.status}<br>
      Assigned: ${data.assignedUnit || "None"}
    `;

    container.appendChild(div);
  });
});
</script>

</body>
</html>
